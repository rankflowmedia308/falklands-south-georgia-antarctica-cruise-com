<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Compass rose background circle -->
  <circle cx="20" cy="20" r="19" fill="#0B1F3A" stroke="#12A89D" stroke-width="1.5"/>
  <!-- Compass cardinal points -->
  <polygon points="20,4 22,18 20,20 18,18" fill="#12A89D"/>
  <polygon points="20,36 22,22 20,20 18,22" fill="rgba(255,255,255,0.4)"/>
  <polygon points="4,20 18,18 20,20 18,22" fill="rgba(255,255,255,0.4)"/>
  <polygon points="36,20 22,18 20,20 22,22" fill="rgba(255,255,255,0.4)"/>
  <!-- Center dot -->
  <circle cx="20" cy="20" r="2.5" fill="#D4A040"/>
  <!-- N marker -->
  <text x="20" y="11" text-anchor="middle" font-family="Inter,sans-serif" font-size="4.5" font-weight="700" fill="#12A89D" letter-spacing="0">N</text>
</svg>
