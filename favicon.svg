<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#0B1F3A"/>
  <!-- Penguin body -->
  <ellipse cx="16" cy="20" rx="7" ry="9" fill="white"/>
  <!-- Penguin head -->
  <circle cx="16" cy="9" r="6" fill="#0B1F3A"/>
  <!-- Penguin belly -->
  <ellipse cx="16" cy="22" rx="4" ry="6" fill="white"/>
  <!-- Eyes -->
  <circle cx="13.5" cy="8" r="1.2" fill="white"/>
  <circle cx="18.5" cy="8" r="1.2" fill="white"/>
  <circle cx="13.5" cy="8" r=".6" fill="#0B1F3A"/>
  <circle cx="18.5" cy="8" r=".6" fill="#0B1F3A"/>
  <!-- Beak -->
  <polygon points="16,10.5 14.5,12.5 17.5,12.5" fill="#D4A040"/>
  <!-- Flippers -->
  <ellipse cx="8.5" cy="19" rx="2.5" ry="5" fill="#0B1F3A" transform="rotate(-15 8.5 19)"/>
  <ellipse cx="23.5" cy="19" rx="2.5" ry="5" fill="#0B1F3A" transform="rotate(15 23.5 19)"/>
  <!-- Feet -->
  <ellipse cx="13" cy="29.5" rx="3" ry="1.2" fill="#D4A040"/>
  <ellipse cx="19" cy="29.5" rx="3" ry="1.2" fill="#D4A040"/>
</svg>
